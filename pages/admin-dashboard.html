<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — SafeVoice</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

<script>
if(localStorage.getItem("isAdminLoggedIn") !== "true"){
    window.location.href = "admin-login.html";
}
</script>

<nav class="navbar">
    <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
</div>
<div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-container">
        <a href="../index.html" class="logo">
            <i class="fas fa-user-shield"></i>
            <span>SafeVoice Admin</span>
        </a>

        <ul class="nav-links">
            <li><a href="#">Dashboard</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="dashboard-layout">

    <aside class="sidebar">
        <ul class="sidebar-menu">
            <li class="active"><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="admin-complaints.html"><i class="fas fa-file-alt"></i> Complaints</a></li>
            <li><a href="#"><i class="fas fa-users"></i> Users</a></li>
            <li><a href="#"><i class="fas fa-exclamation-triangle"></i> SOS</a></li>
            <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">

        <div class="welcome-bar">
            <h1>Welcome Admin 👋</h1>
            <p>Manage SafeVoice system</p>
        </div>

        <div class="summary-cards">

            <div class="summary-card">
                <div class="card-icon blue"><i class="fas fa-file-alt"></i></div>
                <div class="card-info">
                    <h3>154</h3>
                    <p>Complaints</p>
                </div>
            </div>

            <div class="summary-card">
                <div class="card-icon orange"><i class="fas fa-clock"></i></div>
                <div class="card-info">
                    <h3>23</h3>
                    <p>Pending</p>
                </div>
            </div>

            <div class="summary-card">
                <div class="card-icon green"><i class="fas fa-check"></i></div>
                <div class="card-info">
                    <h3>97</h3>
                    <p>Resolved</p>
                </div>
            </div>

            <div class="summary-card">
                <div class="card-icon red"><i class="fas fa-bolt"></i></div>
                <div class="card-info">
                    <h3>11</h3>
                    <p>SOS</p>
                </div>
            </div>

        </div>

    </main>

</div>

<script>
function logout(){
    localStorage.removeItem("isAdminLoggedIn");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
