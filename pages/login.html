<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SafeVoice</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <button class="theme-toggle" id="themeToggle">
    🌙 Dark
</button>
<nav class="navbar">
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-container">
        <a href="../index.html" class="logo"><i class="fas fa-shield-alt"></i><span>SafeVoice</span></a>
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="complaint-track.html">Track Complaint</a></li>
            <li><a href="leaderboard.html">Leaderboard</a></li>
            <li><a href="login.html" class="btn-login">Login</a></li>
            <li><a href="admin-login.html" class="btn-login">Admin</a></li>
            <li><a href="register.html" class="btn-register">Register</a></li>
        </ul>
    </div>
</nav>

<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Welcome Back</h2>
                <p>Login to your SafeVoice account</p>
            </div>
            <div class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" />
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" /><span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button class="btn-auth" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <div class="auth-divider"><span>or</span></div>
                <p class="auth-switch">Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>
</section>

<script>
document.getElementById('loginBtn').addEventListener('click', function() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { alert('Please fill in all fields!'); return; }
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userName', email.split('@')[0]);
    window.location.href = 'dashboard.html';
});
// Enter key
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
<script src="../js/main.js"></script>
</body>
</html>
