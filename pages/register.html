<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — SafeVoice</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/theme.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
/* (your full CSS unchanged - keep as you already have) */
</style>
</head>

<body>

<!-- ================= NAV ================= -->
<nav class="navbar">
    <a href="../index.html" class="logo">SafeVoice</a>
</nav>

<!-- ================= FORM ================= -->
<section class="auth-section">

<div class="auth-container">

<div class="auth-card">

<h2>Create Account</h2>

<!-- ID Upload -->
<input type="file" id="idDocFile" accept="image/*,.pdf">

<img id="previewImg" style="max-width:100%;display:none;" />

<div id="ocrStatus"></div>

<!-- Auto fields -->
<input id="regName" placeholder="Name" readonly>
<input id="regIdNumber" placeholder="ID Number" readonly>

<button id="registerBtn">Register</button>

</div>
</div>
</section>

<!-- ================= SCRIPT ================= -->
<script>

const OCR_API_KEY = "YOUR_KEY_HERE";

let selectedIdType = "nid";

/* ---------------- TOAST ---------------- */
function showToast(msg,type="info"){
    console.log(type+": "+msg);
}

/* ---------------- FILE -> BASE64 ---------------- */
function fileToBase64(file){
    return new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result);
        r.onerror=rej;
        r.readAsDataURL(file);
    });
}

/* ---------------- OCR SPACE FIXED ---------------- */
async function runOCRSpace(file){

    const base64 = await fileToBase64(file);

    const formData = new FormData();
    formData.append("base64Image", base64);
    formData.append("language", "eng");
    formData.append("isOverlayRequired", "false");
    formData.append("detectOrientation", "true");
    formData.append("scale", "true");
    formData.append("OCREngine", "2");

    const res = await fetch("https://api.ocr.space/parse/image", {
        method: "POST",
        headers: {
            apikey: OCR_API_KEY
        },
        body: formData
    });

    return await res.json();
}

/* ---------------- TESSERACT FALLBACK ---------------- */
async function detectTextWithTesseract(file){
    const result = await Tesseract.recognize(file,'eng',{
        logger:m=>console.log(m)
    });
    return result.data.text;
}

/* ---------------- OCR HANDLER ---------------- */
document.getElementById("idDocFile").addEventListener("change", async function(){

    const file = this.files[0];
    if(!file) return;

    document.getElementById("previewImg").style.display="block";
    document.getElementById("previewImg").src = URL.createObjectURL(file);

    showToast("Scanning...","info");

    let text = "";

    try {
        const data = await runOCRSpace(file);

        console.log("OCR RESPONSE:", data);

        if(
            data.IsErroredOnProcessing ||
            !data.ParsedResults ||
            !data.ParsedResults.length
        ){
            throw new Error("OCR Space failed");
        }

        text = data.ParsedResults[0].ParsedText || "";

    } catch(err){
        console.log("OCR SPACE FAILED, switching Tesseract");

        try {
            text = await detectTextWithTesseract(file);
        } catch(e){
            showToast("Both OCR engines failed","error");
            return;
        }
    }

    if(!text || !text.trim()){
        showToast("No readable text found","error");
        return;
    }

    console.log("FINAL TEXT:", text);

    const {name,idNumber} = parseText(text);

    document.getElementById("regName").value = name || "";
    document.getElementById("regIdNumber").value = idNumber || "";

    showToast("OCR completed","success");
});

/* ---------------- PARSER ---------------- */
function parseText(text){

    let name="";
    let idNumber="";

    const lines = text.split("\n").map(l=>l.trim());

    const idMatch = text.match(/\b(\d{10}|\d{17})\b/);
    if(idMatch) idNumber = idMatch[1];

    for(let i=0;i<lines.length;i++){
        if(/name\s*[:\-]/i.test(lines[i])){
            name = lines[i].replace(/.*name\s*[:\-]/i,"").trim();
        }
    }

    return {name,idNumber};
}

/* ---------------- REGISTER BUTTON ---------------- */
document.getElementById("registerBtn").addEventListener("click", ()=>{
    alert("Register clicked (backend connect pending)");
});

</script>

</body>
</html>
