<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SafeVoice</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/admin-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>

<nav class="navbar">
    <div class="hamburger" id="hamburger">
    <span></span>
    <span></span>
    <span></span>
</div>
<div class="nav-overlay" id="navOverlay"></div>
    <div class="nav-container">
        <a href="../index.html" class="logo">
            <i class="fas fa-shield-alt"></i>
            <span>SafeVoice Admin</span>
        </a>

        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="login.html">User Login</a></li>
        </ul>
    </div>
</nav>

<section class="auth-section">
    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <i class="fas fa-user-shield"></i>
                <h2>Admin Panel</h2>
                <p>Authorized access only</p>
            </div>

            <div class="auth-form">

                <form id="adminLoginForm">

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="adminEmail" placeholder="Enter admin email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="adminPassword" placeholder="Enter password">
                        </div>
                    </div>

                    <!-- ✅ FIX: Error message div added -->
                    <div id="loginError" style="display:none;color:#e63946;font-size:13px;margin-bottom:10px;padding:10px;background:rgba(230,57,70,0.1);border-radius:8px;border:1px solid rgba(230,57,70,0.3);">
                        <i class="fas fa-exclamation-circle"></i> <span id="loginErrorMsg">Invalid credentials</span>
                    </div>

                    <button type="submit" class="btn-auth" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Admin Login
                    </button>

                </form>

            </div>

        </div>
    </div>
</section>

<script>
document.getElementById("adminLoginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email    = document.getElementById("adminEmail").value.trim();
    const password = document.getElementById("adminPassword").value.trim();
    const btn      = document.getElementById("loginBtn");
    const errorBox = document.getElementById("loginError");
    const errorMsg = document.getElementById("loginErrorMsg");

    errorBox.style.display = "none";
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

    // ✅ FIX: Call PHP API to create a real server-side session
    // This replaces the old hardcoded credential check that only used localStorage
    try {
        const res  = await fetch("../api/admin_login.php", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            // Also keep localStorage for page-guard checks (admin-complaint.html etc)
            localStorage.setItem("isAdminLoggedIn", "true");
            window.location.href = "admin-dashboard.html";
        } else {
            errorMsg.textContent = data.message || "Invalid credentials";
            errorBox.style.display = "block";
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Admin Login';
        }
    } catch(err) {
        errorMsg.textContent = "Server error. Make sure XAMPP is running.";
        errorBox.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Admin Login';
    }
});
</script>

</body>
</html>
